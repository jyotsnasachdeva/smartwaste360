services:
  - type: web
    name: smartwaste360-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./smartwaste360.db
      - key: ENVIRONMENT
        value: production
      - key: GEMINI_API_KEY
        sync: false
